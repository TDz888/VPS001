name: Create Ubuntu VPS with SSH

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install required tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl jq
        
    - name: Setup SSH user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install Cloudflared
      run: |
        # Tải cloudflared
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        echo "✅ Cloudflared installed"
        
    - name: Start Cloudflare Tunnel
      run: |
        # Tạo tunnel đến SSH
        nohup cloudflared tunnel --url ssh://localhost:22 > cloudflared.log 2>&1 &
        
        # Đợi tunnel khởi tạo
        sleep 8
        
        # Lấy URL từ log
        TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
        
        if [ -n "$TUNNEL_URL" ]; then
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "✅ Tunnel created: $TUNNEL_URL"
        else
          echo "⚠️ Không tìm thấy URL, hiển thị log:"
          cat cloudflared.log
        fi
        
    - name: Get Public IP
      run: |
        PUBLIC_IP=$(curl -s ifconfig.me)
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        
    - name: Display connection info
      run: |
        echo "========================================="
        echo "✅ UBUNTU VPS ĐÃ SẴN SÀNG!"
        echo "========================================="
        echo ""
        echo "🔐 SSH CONNECTION INFO:"
        echo "   Username: $USERNAME"
        echo "   Password: $PASSWORD"
        echo ""
        
        if [ -n "$TUNNEL_URL" ]; then
          echo "📡 CLOUDFLARE TUNNEL:"
          echo "   URL: $TUNNEL_URL"
          echo ""
          echo "📝 CÁCH KẾT NỐI:"
          echo "   Cách 1: Dùng Cloudflare Access (khuyến nghị)"
          echo "     cloudflared access ssh --hostname $TUNNEL_URL"
          echo ""
          echo "   Cách 2: Dùng Web-based SSH (dễ nhất)"
          echo "     Mở trình duyệt: https://one.dash.cloudflare.com/"
          echo ""
        fi
        
        echo "🌐 PUBLIC IP: $PUBLIC_IP"
        echo ""
        echo "========================================="
        
        # Tạo file thông tin chi tiết
        cat > vps-info.txt << 'VPSEOF'
UBUNTU VPS CONNECTION INFORMATION
===================================
Username: $USERNAME
Password: $PASSWORD
Public IP: $PUBLIC_IP
Cloudflare Tunnel: $TUNNEL_URL

CÁCH KẾT NỐI SSH (3 cách):
===================================

CÁCH 1: Dùng Cloudflare Tunnel (đơn giản nhất)
-----------------------------------
1. Cài cloudflared:
   Windows: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/install-and-setup/installation/
   Linux/Mac: curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
              chmod +x cloudflared

2. Kết nối SSH:
   cloudflared access ssh --hostname $TUNNEL_URL

3. Nhập username: $USERNAME
   Nhập password: $PASSWORD


CÁCH 2: Dùng ngrok (nếu muốn TCP)
-----------------------------------
1. Tải ngrok: https://ngrok.com/download
2. Chạy: ngrok tcp 22
3. Kết nối: ssh $USERNAME@[ngrok-host] -p [ngrok-port]


CÁCH 3: Dùng Local Port Forwarding
-----------------------------------
1. Mở terminal mới, chạy:
   cloudflared tunnel --url ssh://localhost:22

2. Ở terminal khác, kết nối:
   ssh $USERNAME@localhost -p 22


THÔNG TIN KHÁC:
===================================
Created: $(date)
Duration: ${{ github.event.inputs.duration }} hours
Status: VPS đang chạy
VPSEOF

        # Thay thế biến trong file
        sed -i "s/\$USERNAME/$USERNAME/g" vps-info.txt
        sed -i "s/\$PASSWORD/$PASSWORD/g" vps-info.txt
        sed -i "s/\$PUBLIC_IP/$PUBLIC_IP/g" vps-info.txt
        sed -i "s/\$TUNNEL_URL/${TUNNEL_URL:-'Chưa có tunnel'}/g" vps-info.txt
        sed -i "s/\$(date)/$(date)/g" vps-info.txt
        
    - name: Upload connection info
      uses: actions/upload-artifact@v4
      with:
        name: vps-connection-info
        path: vps-info.txt
        
    - name: Keep VPS alive
      run: |
        DURATION_HOURS=${{ github.event.inputs.duration }}
        DURATION_SECONDS=$((DURATION_HOURS * 3600))
        echo "🕐 VPS sẽ chạy trong $DURATION_HOURS giờ..."
        echo "⏰ Sẽ tắt lúc: $(date -d "+$DURATION_HOURS hours")"
        sleep $DURATION_SECONDS
